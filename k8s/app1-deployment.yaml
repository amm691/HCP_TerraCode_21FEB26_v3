k8s/app1-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: asia-south1-docker.pkg.dev/auspicious-silo-485501-u2/app-repo/app1:TAG
        ports:
        - containerPort: 8080