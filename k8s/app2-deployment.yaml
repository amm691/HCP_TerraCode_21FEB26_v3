k8s/app2-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
      - name: app2
        image: asia-south1-docker.pkg.dev/auspicious-silo-485501-u2/app-repo/app1:TAG
        ports:
        - containerPort: 8080